document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border-radius:12px;white-space:nowrap\" style-focus=\"{{ cellFocus }}\">{{ selInfo.bookLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ MOBILE COLUMN ============ -->\n    <div style=\"display:flex;flex-direction:column;gap:44px\">\n\n      <!-- mobile frame -->\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:2px;color:#0E3B2E;opacity:.6\">MOBILE — 390<\u002Fdiv>\n        <div style=\"width:390px;height:820px;position:relative;background:#F7F6F2;border-radius:28px;overflow:hidden;box-shadow:0 30px 60px -30px rgba(9,42,33,.45);border:1px solid #cdd7d1\">\n          <div style=\"position:absolute;inset:0;overflow:auto;padding-bottom:96px\">\n            <!-- gallery -->\n            <div style=\"position:relative;height:220px;background:repeating-linear-gradient(135deg,#0E3B2E 0 16px,#0c3529 16px 32px)\">\n              <span style=\"position:absolute;left:16px;bottom:14px;font-family:ui-monospace,monospace;font-size:10px;color:rgba(247,246,242,.72)\">[ court photo ]<\u002Fspan>\n              <span style=\"position:absolute;right:14px;bottom:14px;background:rgba(9,42,33,.75);color:#F7F6F2;font-size:11px;font-weight:700;padding:6px 12px;border-radius:999px\">View all 8<\u002Fspan>\n            <\u002Fdiv>\n            <!-- header -->\n            <div style=\"padding:18px 18px 14px;display:flex;flex-direction:column;gap:10px\">\n              <h1 style=\"margin:0;font-family:'Anton';font-size:30px;line-height:.98;letter-spacing:.5px;text-transform:uppercase;color:#12222B\">Goal Line Arena<\u002Fh1>\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:13px\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:#0E3B2E\"><\u002Fspan>\n                <span style=\"font-weight:600\">Sanepa, Lalitpur<\u002Fspan>\n                <a href=\"#\" style=\"color:#0E3B2E;text-decoration:underline;text-underline-offset:3px;font-weight:600\">Maps<\u002Fa>\n                <span style=\"margin-left:auto;font-family:'Anton';font-size:15px\">★ 4.8<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                <span style=\"padding:6px 11px;border-radius:999px;border:1.5px solid #BFD8CE;font-size:11.5px;font-weight:600;color:#0E3B2E\">Floodlights<\u002Fspan>\n                <span style=\"padding:6px 11px;border-radius:999px;border:1.5px solid #BFD8CE;font-size:11.5px;font-weight:600;color:#0E3B2E\">Parking<\u002Fspan>\n                <span style=\"padding:6px 11px;border-radius:999px;border:1.5px solid #BFD8CE;font-size:11.5px;font-weight:600;color:#0E3B2E\">Water<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#0E3B2E;font-weight:600\"><span style=\"color:#0E3B2E\">✓<\u002Fspan> Pay online or at venue<\u002Fdiv>\n            <\u002Fdiv>\n            <!-- court tabs -->\n            <div style=\"padding:0 18px 14px;display:flex;gap:8px\">\n              <button onclick=\"{{ setA }}\" style=\"{{ tabAStyleM }}\" style-focus=\"{{ cellFocus }}\">Court A · 5v5<\u002Fbutton>\n              <button onclick=\"{{ setB }}\" style=\"{{ tabBStyleM }}\" style-focus=\"{{ cellFocus }}\">Court B · 6v6<\u002Fbutton>\n            <\u002Fdiv>\n            <!-- scoreboard -->\n            <div style=\"background:#0E3B2E;padding:16px 0 18px\">\n              <div style=\"padding:0 18px 12px;display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"font-family:'Figtree';font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#BFD8CE\">Availability · swipe days →<\u002Fdiv>\n                <span style=\"width:7px;height:7px;border-radius:50%;background:#FF6A2B;box-shadow:0 0 0 4px rgba(255,106,43,.2)\"><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative;padding:0 18px\">\n                <div style=\"position:relative;overflow-x:auto;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch\">\n                  <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:rgba(247,246,242,.12);overflow:hidden;z-index:4;border-radius:2px\">\n                    <div style=\"height:100%;width:100%;background:#FF6A2B;transform-origin:left;animation:refreshbar 60s linear infinite\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:52px repeat(7,94px);width:max-content;border-top:2px solid rgba(247,246,242,.8);border-left:2px solid rgba(247,246,242,.8)\">\n                    <sc-for list=\"{{ gridItems }}\" as=\"it\" hint-placeholder-count=\"32\">\n                      <button disabled=\"{{ it.disabled }}\" onclick=\"{{ it.onSelect }}\" style=\"{{ it.style }}\" style-focus=\"{{ cellFocus }}\" aria-label=\"{{ it.aria }}\">\n                        <span style=\"{{ it.tagStyle }}\">{{ it.tag }}<\u002Fspan>\n                        <span style=\"{{ it.mainStyle }}\">{{ it.main }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"position:absolute;top:54px;left:52px;width:34px;height:34px;border-top:2px solid rgba(247,246,242,.9);border-left:2px solid rgba(247,246,242,.9);border-top-left-radius:34px;pointer-events:none;z-index:3\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:16px 18px 0;display:flex;flex-wrap:wrap;gap:10px 16px\">\n                <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex;align-items:center;gap:7px\">\n                    <span style=\"{{ lg.swatch }}\"><\u002Fspan>\n                    <span style=\"font-size:11px;color:#BFD8CE;font-weight:500\">{{ lg.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- sticky bottom booking bar -->\n          <div style=\"position:absolute;left:0;right:0;bottom:0;background:#0E3B2E;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 -12px 30px -12px rgba(9,42,33,.6)\">\n            <div style=\"display:flex;flex-direction:column;gap:2px;min-width:0\">\n              <span style=\"font-family:'Figtree';font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#FF6A2B\">Selected<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:700;color:#F7F6F2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums\">{{ selInfo.summary }}<\u002Fspan>\n            <\u002Fdiv>\n            <button style=\"margin-left:auto;border:none;cursor:pointer;background:#FF6A2B;color:#092A21;font-family:'Anton';font-size:14px;letter-spacing:.5px;text-transform:uppercase;padding:13px 18px;border-radius:12px;white-space:nowrap\" style-focus=\"{{ cellFocus }}\">{{ selInfo.bookLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- micro-state: conflict toast -->\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:2px;color:#0E3B2E;opacity:.6\">MICRO-STATE · CONFLICT (race loss)<\u002Fdiv>\n        <div style=\"width:390px;background:#0E3B2E;border-radius:22px;overflow:hidden;padding:18px 16px 16px;box-shadow:0 24px 50px -28px rgba(9,42,33,.5)\">\n          <div style=\"background:#092A21;border-radius:14px;padding:16px;border:1px solid rgba(247,246,242,.1)\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start\">\n              <span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#FF6A2B;color:#092A21;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px\">!<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;gap:3px\">\n                <span style=\"font-size:15px;font-weight:700;color:#F7F6F2\">Just missed it — that slot was taken<\u002Fspan>\n                <span style=\"font-size:12.5px;color:#BFD8CE\">Someone booked Sat 7–8 PM a moment ago. Here's what's still open:<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-top:14px\">\n              <button style=\"flex:1;border:1.5px solid #FF6A2B;background:transparent;color:#F7F6F2;cursor:pointer;border-radius:999px;padding:10px 8px;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums\" style-focus=\"{{ cellFocus }}\">Sat · 8–9 PM · Rs 1,500<\u002Fbutton>\n              <button style=\"flex:1;border:1.5px solid #FF6A2B;background:transparent;color:#F7F6F2;cursor:pointer;border-radius:999px;padding:10px 8px;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums\" style-focus=\"{{ cellFocus }}\">Sun · 7–8 PM · Rs 1,500<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- micro-state: refresh hairline -->\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:2px;color:#0E3B2E;opacity:.6\">MICRO-STATE · 60s REFRESH (hairline, no spinner)<\u002Fdiv>\n        <div style=\"width:390px;background:#0E3B2E;border-radius:22px;overflow:hidden;padding:0 0 18px\">\n          <div style=\"height:3px;background:rgba(247,246,242,.12);overflow:hidden\">\n            <div style=\"height:100%;width:100%;background:#FF6A2B;transform-origin:left;animation:refreshbar 60s linear infinite\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 18px 0;display:flex;flex-direction:column;gap:8px\">\n            <span style=\"font-family:'Anton';font-size:15px;letter-spacing:.5px;text-transform:uppercase;color:#F7F6F2\">Prices &amp; open slots stay live<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#BFD8CE;line-height:1.5\">A thin Flare hairline sweeps left→right over 60s at the top of the grid, then availability quietly re-syncs. No spinner, no layout shift — the scoreboard just updates in place.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { court: 'A', sel: '0-19' };\n\n  fmt(n) { return 'Rs ' + n.toLocaleString('en-IN'); }\n  h12(h) { const hh = (h % 12 === 0) ? 12 : (h % 12); const ap = h < 12 ? 'AM' : 'PM'; return { hh, ap }; }\n  hourLabel(h) { const { hh, ap } = this.h12(h); return hh + ' ' + ap; }\n  rangeLabel(h) { const a = this.h12(h), b = this.h12(h + 1); const same = a.ap === b.ap; return a.hh + (same ? '' : ' ' + a.ap) + '\\u2013' + b.hh + ' ' + b.ap; }\n\n  data() {\n    const days = [\n      { i: 0, dow: 'SAT', short: 'Sat', date: '4 Jul', closed: false },\n      { i: 1, dow: 'SUN', short: 'Sun', date: '5 Jul', closed: false },\n      { i: 2, dow: 'MON', short: 'Mon', date: '6 Jul', closed: false },\n      { i: 3, dow: 'TUE', short: 'Tue', date: '7 Jul', closed: true },\n      { i: 4, dow: 'WED', short: 'Wed', date: '8 Jul', closed: false },\n      { i: 5, dow: 'THU', short: 'Thu', date: '9 Jul', closed: false },\n      { i: 6, dow: 'FRI', short: 'Fri', date: '10 Jul', closed: false },\n    ];\n    const hours = []; for (let h = 6; h <= 21; h++) hours.push(h);\n    const booked = new Set(['1-19','2-18','2-20','4-19','5-18','6-19','1-17','4-16','6-18','2-8','4-9','5-21']);\n    const peak = new Set(['0-20','0-21','6-20','6-21','5-19']);\n    for (const k of peak) if (booked.has(k)) peak.delete(k);\n    return { days, hours, booked, peak };\n  }\n\n  priceOf(i, h, peak) { if (peak.has(i + '-' + h)) return 2000; return h < 12 ? 1200 : 1500; }\n\n  cellState(day, i, h, booked, peak) {\n    if (day.closed) return 'closed';\n    if (i === 0 && h <= 13) return 'past';\n    if (booked.has(i + '-' + h)) return 'booked';\n    if (peak.has(i + '-' + h)) return 'peak';\n    return 'available';\n  }\n\n  renderVals() {\n    const white = '#F7F6F2', turf = '#0E3B2E', deep = '#092A21', flare = '#FF6A2B', flood = '#BFD8CE';\n    const line = '2px solid rgba(247,246,242,0.8)';\n    const anton = \"'Anton', sans-serif\";\n    const { days, hours, booked, peak } = this.data();\n\n    const cellFocus = { outline: '3px solid #F7F6F2', outlineOffset: '-3px', zIndex: 5, position: 'relative' };\n\n    const base = {\n      position: 'relative', border: 'none', borderRight: line, borderBottom: line,\n      background: 'transparent', color: white, textAlign: 'left', padding: '7px 9px',\n      minHeight: '48px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between',\n      gap: '4px', cursor: 'default', width: '100%'\n    };\n    const priceStyle = { fontFamily: anton, fontSize: '15px', letterSpacing: '.5px', lineHeight: 1, fontVariantNumeric: 'tabular-nums' };\n    const wordStyle = { fontFamily: \"'Figtree'\", fontSize: '10.5px', fontWeight: 700, letterSpacing: '.4px', textTransform: 'uppercase' };\n    const eyebrow = (color) => ({ fontFamily: \"'Figtree'\", fontSize: '8.5px', fontWeight: 800, letterSpacing: '1.4px', textTransform: 'uppercase', color });\n\n    const items = [];\n\n    // corner\n    items.push({ key: 'corner', disabled: true, onSelect: null, aria: 'Time and price legend',\n      style: { ...base, background: deep, minHeight: '54px', justifyContent: 'flex-end', alignItems: 'flex-start' },\n      tag: '', tagStyle: {}, main: 'NPR', mainStyle: { fontFamily: 'ui-monospace, monospace', fontSize: '9px', letterSpacing: '1px', color: flood, opacity: .7 } });\n\n    // day headers\n    days.forEach((d) => {\n      items.push({ key: 'h' + d.i, disabled: true, onSelect: null, aria: d.dow + ' ' + d.date + (d.closed ? ' closed' : ''),\n        style: { ...base, background: deep, minHeight: '54px', justifyContent: 'center', alignItems: 'flex-start', gap: '2px' },\n        tag: d.dow, tagStyle: { fontFamily: anton, fontSize: '14px', letterSpacing: '.5px', color: d.closed ? flood : white },\n        main: d.closed ? 'Holiday' : d.date,\n        mainStyle: d.closed\n          ? { ...eyebrow(flood), fontSize: '9.5px' }\n          : { fontFamily: \"'Figtree'\", fontSize: '11px', fontWeight: 500, color: flood } });\n    });\n\n    // rows\n    hours.forEach((h) => {\n      items.push({ key: 'r' + h, disabled: true, onSelect: null, aria: this.hourLabel(h),\n        style: { ...base, background: deep, justifyContent: 'center', alignItems: 'flex-end', paddingRight: '10px' },\n        tag: '', tagStyle: {}, main: this.hourLabel(h),\n        mainStyle: { fontFamily: \"'Figtree'\", fontSize: '11px', fontWeight: 600, letterSpacing: '.3px', color: flood } });\n\n      days.forEach((d) => {\n        const key = d.i + '-' + h;\n        let st = this.cellState(d, d.i, h, booked, peak);\n        const selectable = (st === 'available' || st === 'peak');\n        const isSel = selectable && this.state.sel === key;\n        if (isSel) st = 'selected';\n\n        let sty = { ...base }, main = '', mainSty = { ...priceStyle }, tag = '', tagSty = {};\n        const price = this.priceOf(d.i, h, peak);\n\n        if (st === 'available') {\n          sty.background = 'rgba(247,246,242,0.055)'; sty.cursor = 'pointer';\n          main = this.fmt(price); mainSty.color = white;\n        } else if (st === 'peak') {\n          sty.background = 'rgba(247,246,242,0.055)'; sty.cursor = 'pointer';\n          main = this.fmt(price); mainSty.color = white;\n          tag = 'PEAK'; tagSty = eyebrow(flood);\n        } else if (st === 'selected') {\n          sty.background = flare; sty.cursor = 'pointer';\n          main = this.fmt(price); mainSty.color = deep;\n          tag = 'SELECTED'; tagSty = eyebrow(deep);\n        } else if (st === 'booked') {\n          sty.background = deep; sty.color = 'rgba(191,216,206,0.5)';\n          main = 'Booked'; mainSty = { ...wordStyle, color: 'rgba(191,216,206,0.5)' };\n        } else if (st === 'past') {\n          sty.background = 'rgba(9,42,33,0.55)';\n          main = '\\u2014'; mainSty = { ...priceStyle, color: 'rgba(191,216,206,0.28)' };\n        } else if (st === 'closed') {\n          sty.background = '#0a2a20';\n          sty.backgroundImage = 'repeating-linear-gradient(45deg, rgba(191,216,206,0.14) 0 5px, rgba(191,216,206,0) 5px 11px)';\n          main = (h === 13) ? 'Closed' : '';\n          mainSty = { ...wordStyle, color: 'rgba(191,216,206,0.5)' };\n        }\n\n        items.push({ key, disabled: !selectable, aria: d.dow + ' ' + this.rangeLabel(h) + ' ' + st + (selectable ? ' ' + this.fmt(price) : ''),\n          onSelect: selectable ? () => this.setState({ sel: key }) : null,\n          style: sty, main, mainStyle: mainSty, tag, tagStyle: tagSty });\n      });\n    });\n\n    // legend\n    const sw = (extra) => ({ width: '16px', height: '16px', borderRadius: '3px', border: '1.5px solid rgba(247,246,242,0.7)', display: 'inline-block', ...extra });\n    const legend = [\n      { label: 'Available', swatch: sw({ background: 'rgba(247,246,242,0.09)' }) },\n      { label: 'Peak price', swatch: sw({ background: 'rgba(247,246,242,0.09)', boxShadow: 'inset 0 -4px 0 rgba(191,216,206,0.5)' }) },\n      { label: 'Selected', swatch: sw({ background: flare, border: '1.5px solid ' + flare }) },\n      { label: 'Booked', swatch: sw({ background: deep }) },\n      { label: 'Closed', swatch: sw({ background: '#0a2a20', backgroundImage: 'repeating-linear-gradient(45deg, rgba(191,216,206,0.35) 0 3px, rgba(191,216,206,0) 3px 6px)' }) },\n      { label: 'Past', swatch: sw({ background: 'rgba(9,42,33,0.55)', border: '1.5px solid rgba(247,246,242,0.3)' }) },\n    ];\n\n    // selection info\n    const [si, sh] = this.state.sel.split('-').map(Number);\n    const d = days[si];\n    const sp = this.priceOf(si, sh, peak);\n    const selInfo = {\n      summary: d.short + ' ' + d.date + ' \\u00b7 ' + this.rangeLabel(sh) + ' \\u00b7 Court ' + this.state.court,\n      bookLabel: 'Book \\u2014 ' + this.fmt(sp)\n    };\n\n    // court tabs\n    const tabOn = { border: 'none', cursor: 'pointer', background: turf, color: white, fontFamily: \"'Figtree'\", fontWeight: 700, fontSize: '13.5px', padding: '11px 20px', borderRadius: '999px' };\n    const tabOff = { border: '1.5px solid ' + flood, cursor: 'pointer', background: 'transparent', color: turf, fontFamily: \"'Figtree'\", fontWeight: 700, fontSize: '13.5px', padding: '11px 20px', borderRadius: '999px' };\n    const tabOnM = { ...tabOn, flex: 1, fontSize: '12.5px', padding: '10px 8px' };\n    const tabOffM = { ...tabOff, flex: 1, fontSize: '12.5px', padding: '10px 8px' };\n    const A = this.state.court === 'A';\n\n    return {\n      gridItems: items, cellFocus, legend, selInfo,\n      setA: () => this.setState({ court: 'A' }), setB: () => this.setState({ court: 'B' }),\n      tabAStyle: A ? tabOn : tabOff, tabBStyle: A ? tabOff : tabOn,\n      tabAStyleM: A ? tabOnM : tabOffM, tabBStyleM: A ? tabOffM : tabOnM,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
